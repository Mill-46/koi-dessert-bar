name: koi_dessert_bar
description: Premium Koi Dessert Bar mobile application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.6

  # State Management
  provider: ^6.1.2
  go_router: ^14.8.1

  # UI & Fonts
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1

  # Image
  image_picker: ^1.1.2
  image_cropper: ^7.1.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5
  collection: ^1.18.0

  # Storage
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
